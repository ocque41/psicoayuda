name: Deploy to Cloudflare

# Build en Linux (OpenNext no compila un Worker funcional en Windows nativo) y
# despliega a Cloudflare. Disparo MANUAL para no publicar WIP a medio hacer por
# accidente (varias ramas/sesiones empujan a main).
#
# Requisito (una vez, en GitHub → Settings → Secrets and variables → Actions):
#   - CLOUDFLARE_API_TOKEN  (permisos Workers Scripts:Edit, D1:Edit, Workers Routes:Edit)
# El account id va abajo (no es secreto). El secreto de RUNTIME del Worker
# (BETTER_AUTH_SECRET) se pone una vez con `wrangler secret put`, NO aquí.

on:
  workflow_dispatch:

concurrency:
  group: cf-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (production)
        # El CLOUDFLARE_API_TOKEN de CI ya tiene permiso D1:Edit, así que este paso
        # aplica las migraciones pendientes antes de desplegar. Es BLOQUEANTE a
        # propósito: si una migración falla, se detiene el deploy (evita schema
        # drift, es decir, publicar código que espera tablas/columnas inexistentes).
        run: pnpm db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: acf3c9d9659c2195909c29fd6af3316e

      - name: Build (OpenNext → Cloudflare)
        run: pnpm exec opennextjs-cloudflare build
        env:
          NIDO_DB_TARGET: cloudflare
          NEXT_PUBLIC_SITE_URL: https://saludmental-venezuela.com
          BETTER_AUTH_URL: https://saludmental-venezuela.com
          # Marcador SOLO para el build; el secreto real vive como secreto de
          # Cloudflare (wrangler secret put BETTER_AUTH_SECRET).
          BETTER_AUTH_SECRET: deploy-build-placeholder-not-the-real-secret

      - name: Deploy
        run: pnpm exec opennextjs-cloudflare deploy
        env:
          NIDO_DB_TARGET: cloudflare
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: acf3c9d9659c2195909c29fd6af3316e

      - name: Smoke test + rollback automático
        # Red de seguridad contra el bug NO determinista del bundler RSC de
        # OpenNext/Next: a veces publica un bundle donde un componente cliente
        # (p. ej. AuthPanel en /pro) falta en el React Client Manifest y la ruta
        # responde 500 aunque el build "pase". Aquí probamos las rutas clave ya
        # en producción; si alguna no da 200 tras varios reintentos (margen para
        # la propagación al edge), revertimos al deploy anterior y dejamos el job
        # en rojo. Re-lanzar el workflow suele producir un build sano.
        run: |
          set -uo pipefail
          check() {
            local path="$1" code=""
            for i in 1 2 3 4 5 6; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "https://saludmental-venezuela.com${path}" || echo 000)
              if [ "$code" = "200" ]; then
                echo "OK  GET ${path} -> 200"
                return 0
              fi
              echo "... GET ${path} -> ${code} (reintento ${i}/6)"
              sleep 5
            done
            echo "FALLO GET ${path} -> ${code}"
            return 1
          }
          ok=1
          check "/" || ok=0
          check "/pro" || ok=0
          if [ "$ok" != "1" ]; then
            echo "::error::Smoke test falló tras el deploy. Revirtiendo al deploy anterior."
            pnpm exec wrangler rollback --message "Auto-rollback: el smoke test post-deploy detectó 500 (probable manifest RSC flaky de OpenNext)."
            exit 1
          fi
          echo "Smoke test OK: producción sana."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: acf3c9d9659c2195909c29fd6af3316e
