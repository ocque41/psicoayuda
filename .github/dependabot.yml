version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
      test-and-tooling:
        patterns:
          - "@biomejs/*"
          - typescript
          - vitest
          - tsx
